{% extends "base.html" %}
{% block title %}Register Restaurant{% endblock %}
{% block content %}
<div class="container-sm" style="max-width:600px;padding-top:2rem;">
    <div class="page-title">🍽️ Register Your Restaurant</div>
    <p class="page-subtitle">Join SaveBite and start reducing food waste</p>
    <div class="form-card">
        <form method="POST">
            <div class="form-group"><label class="form-label">Restaurant Name *</label><input type="text" name="name" class="form-control" placeholder="e.g. Spice Garden" required></div>
            <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3" placeholder="Tell customers about your restaurant..."></textarea></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Location / Area *</label><input type="text" name="location" class="form-control" placeholder="e.g. Koramangala, Bangalore" required></div>
                <div class="form-group"><label class="form-label">Cuisine Type</label><input type="text" name="cuisine" class="form-control" placeholder="e.g. North Indian, Chinese"></div>
            </div>
            <div class="form-group"><label class="form-label">Contact Phone</label><input type="tel" name="phone" class="form-control" placeholder="+91 9999999999"></div>
            <button type="submit" class="btn btn-primary btn-block mt-2"><i class="fas fa-store"></i> Register Restaurant</button>
        </form>
    </div>
</div>
{% endblock %}
