{% extends "base.html" %}
{% block title %}Register Shop{% endblock %}
{% block content %}
<div class="container-sm" style="max-width:600px;padding-top:2rem;">
    <div class="page-title">🏪 Register Your Shop</div>
    <p class="page-subtitle">Add your closing shop to start listing items</p>
    <div class="form-card">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Shop Name *</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. TechZone Electronics" required>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Brief description of your shop and what items you sell..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Location / Address *</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. MG Road, Bangalore" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Contact Phone</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+91 9999999999">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2">
                <i class="fas fa-store"></i> Register Shop
            </button>
        </form>
    </div>
</div>
{% endblock %}
