{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card form-card">
        <div style="text-align:center;margin-bottom:1.5rem;">
            <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#16a34a,#84cc16);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:#fff;"><i class="fas fa-leaf"></i></div>
        </div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-subtitle">Sign in to your SaveBite account</div>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="passInput" class="form-control" placeholder="••••••••" required style="padding-right:3rem;">
                    <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        <hr class="divider">
        <div class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></div>
        <div class="auth-footer mt-1" style="font-size:0.78rem;">🔐 Admin: <code>admin@savebite.com</code> / <code>admin123</code></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePass(){const i=document.getElementById('passInput'),e=document.getElementById('eyeIcon');if(i.type==='password'){i.type='text';e.className='fas fa-eye-slash';}else{i.type='password';e.className='fas fa-eye';}}
</script>
{% endblock %}
